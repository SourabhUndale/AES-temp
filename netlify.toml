---

**Fix 2: Check your Netlify deploy settings**

Go to **Netlify Dashboard → Your Site → Site Configuration → Build & Deploy** and make sure:

| Setting | Value |
|---|---|
| Build command | `npm run build` |
| Publish directory | `dist` |
| Base directory | `frontend` (if your code is in a subfolder) |

